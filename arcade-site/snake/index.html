<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="eyebrow">Northfield Student Hub</div>
    <h1>Pattern Runner</h1>
    <p class="hint">Use Arrow Keys or WASD to move. Press Space to pause and Enter to restart.</p>

    <div class="topbar">
      <div class="score">Score: <span id="score">0</span></div>
      <div class="score">Best: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="400" height="400"></canvas>
    <p id="status">Click the board or press a direction key to begin.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
