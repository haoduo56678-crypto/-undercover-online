<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小游戏合集</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="badge">在线小游戏</span>
      <h1>小游戏合集</h1>
      <p class="subtitle">一个轻量、可直接部署的网页小游戏站。目前收录：贪吃蛇、扫雷。</p>
    </section>

    <section class="games">
      <a class="card" href="./snake/">
        <div class="icon">🐍</div>
        <h2>贪吃蛇</h2>
        <p>经典街机玩法，支持方向键 / WASD，空格暂停。</p>
        <span class="enter">开始游戏 →</span>
      </a>

      <a class="card" href="./minesweeper/">
        <div class="icon">💣</div>
        <h2>扫雷</h2>
        <p>经典扫雷玩法，支持右键插旗，还有便捷自动判断操作。</p>
        <span class="enter">开始游戏 →</span>
      </a>
    </section>

    <section class="tips">
      <h3>部署说明</h3>
      <p>把整个 <code>arcade-site</code> 文件夹作为静态网站目录部署即可，其他人就能正常访问和游玩。</p>
    </section>
  </main>
</body>
</html>
